name: Run Scraper

on:
  workflow_dispatch: # Manual run ke liye
  schedule:
    - cron: '0 * * * *' # Har ghante run hoga

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clone Code from Hugging Face
        env:
          # GitHub Secrets mein HF_TOKEN naam se token save rakhein
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Sudarshan143/Scrapper2 repo_code
          
      - name: Install Dependencies
        run: |
          pip install -r repo_code/requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Scraper
        run: |
          python repo_code/auto_scraper.py
          
